<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas FC NFC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0A0A0A, #1a0000);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card-fc {
    position: relative;
    width: 90%;
    max-width: 320px;
    height: 480px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(200,16,46,0.8);
}

.card-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(135deg, rgba(200,16,46,0.9), rgba(0,0,0,0.9)),
        repeating-linear-gradient(
            45deg,
            #C8102E,
            #C8102E 20px,
            #000000 20px,
            #000000 40px
        );
    z-index: 1;
}

.card-player {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-height: 320px;
    object-fit: contain;
    z-index: 2;
}

.card-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
    z-index: 3;
}

.card-name {
    font-size: 22px;
    font-weight: bold;
}

.card-details {
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 16px;
    margin-top: 5px;
}

.card-details span {
    background: rgba(0,0,0,0.6);
    padding: 4px 10px;
    border-radius: 8px;
}

/* BOTONES */
.btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    background: #C8102E;
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
}

.btn:hover {
    background: #a50d25;
}

/* PREMIUM */
.btn-premium {
    display: block;
    width: 90%;
    max-width: 320px;
    margin: 25px auto;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    color: #111;
    text-decoration: none;
    border-radius: 15px;

    background: linear-gradient(135deg,#FFD700,#FFC300,#FFB300,#FFD700);
}

.separador {
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #C8102E, #000000);
    margin: 25px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="card-fc">
    <div class="card-bg"></div>

    <img id="player-img" class="card-player" src="atlas.jpg">

    <div class="card-info">
        <div class="card-name">Atlas FC</div>
        <div class="card-details">
            <span>MX</span>
            <span>🦊</span>
        </div>
    </div>
</div>

<!-- BOTONES PREMIUM -->
<div id="premium-container">
    <a class="btn-premium" href="https://www.instagram.com/atlasfc/" target="_blank">⭐ Instagram</a>
    <a class="btn-premium" href="https://www.youtube.com/results?search_query=atlas+campeon+liga+mx" target="_blank">🎥 Campeón</a>
    <a class="btn-premium" href="https://www.google.com/search?q=atlas+fc+estadisticas" target="_blank">📊 Perfil</a>
</div>

<div class="separador"></div>

<a class="btn" href="https://atlasfc.com.mx/" target="_blank">🌐 Sitio Oficial</a>
<a class="btn" href="https://www.youtube.com/@AtlasFC" target="_blank">▶️ YouTube Oficial</a>
<a class="btn" href="https://www.instagram.com/atlasfc/" target="_blank">📸 Instagram Oficial</a>
<a class="btn" href="https://www.ticketmaster.com.mx/" target="_blank">🎟️ Boletos</a>
<a class="btn" href="https://shop.atlasfc.com.mx/?utm_source=google&utm_medium=search&utm_campaign=AFC_RET-MX_AP25_BRAND_NA_GOOGLE_SEM_ACC_CONV_CPA&gad_source=1&gad_campaignid=22752636391&gbraid=0AAAAAonMnRi2rweH5RiSnSJ3Q8Vr96bcQ&gclid=CjwKCAjwnZfPBhAGEiwAzg-VzPruuNHwtuWFhGiPgsCqdlxoS82sgXxG0l_aqAHVSrPcXWuQmyDBLhoCSyQQAvD_BwE" target="_blank">🛒 Tienda Oficial</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=atlas+proximo+partido" target="_blank">📅 Próximo Partido</a>
<a class="btn" href="https://www.google.com/search?q=atlas+calendario" target="_blank">🗓️ Calendario</a>
<a class="btn" href="https://www.google.com/search?q=tabla+liga+mx" target="_blank">📊 Tabla Liga MX</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=palmares+atlas+fc" target="_blank">🏆 Palmarés</a>
<a class="btn" href="https://www.vivoelfutbol.com.mx/juego.php?eq1=3&eq2=6" target="_blank">⚔️ Clásico Tapatío</a>

</div>

</body>
</html>
